name: SMBkits Google Search Stealth Scraper

on:
  schedule:
    - cron: '0 */12 * * *'   # 12시간마다 (하루 2회)
  workflow_dispatch:
    inputs:
      total_chunks:
        description: '병렬 러너 수 (기본: 4, public repo면 8까지 가능)'
        required: false
        default: '4'
      limit:
        description: '청크당 처리 행 수 (기본: 200)'
        required: false
        default: '200'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      max-parallel: 4      # private repo 2000분/월 예산 내 안전값
      fail-fast: false      # 하나 실패해도 나머지 계속 실행
      matrix:
        chunk: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Install and start Tor
        run: |
          sudo apt-get install -y tor
          # ControlPort 활성화 (IP 로테이션 신호용)
          echo "ControlPort 9051" | sudo tee -a /etc/tor/torrc
          echo "CookieAuthentication 0" | sudo tee -a /etc/tor/torrc
          sudo service tor restart
          sleep 15  # Tor 회로 연결 대기
          echo "Tor 상태: $(sudo service tor status | grep Active)"

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          EOF

      - name: Run stealth scraper
        run: |
          python -u scrapers/gmaps_scraper.py \
            --chunk ${{ matrix.chunk }} \
            --total-chunks ${{ github.event.inputs.total_chunks || '4' }} \
            --limit ${{ github.event.inputs.limit || '200' }}
        env:
          PYTHONUNBUFFERED: "1"
