name: SMBkits Enrichment Pipeline

on:
  workflow_dispatch:
    inputs:
      start_row:
        description: '시작 행 인덱스 (0-based, 기본값: 0)'
        required: false
        default: '0'
  schedule:
    # 매일 오전 2시 (UTC) 자동 실행 — 미처리 행이 남아있으면 계속 처리
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 340   # GitHub Actions 6h 제한 안전마진

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Write Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          EOF

      - name: Run enrichment
        run: python -u scrapers/enrich.py
        env:
          PYTHONUNBUFFERED: "1"
