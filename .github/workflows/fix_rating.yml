name: SMBkits Fix Rating

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix-rating:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          EOF

      - name: Run fix_rating
        run: python -u scrapers/fix_rating.py
        env:
          PYTHONUNBUFFERED: "1"
