name: SMBkits Gemini Scraper

on:
  schedule:
    - cron: '0 */3 * * *'   # 3시간마다 (하루 8회)
  workflow_dispatch:
    inputs:
      total_chunks:
        description: '병렬 러너 수 (기본: 4)'
        required: false
        default: '4'
      limit:
        description: '청크당 처리 행 수 (기본: 200)'
        required: false
        default: '1000'
      category:
        description: '업종 (기본값: restaurant)'
        required: false
        default: 'restaurant'
      min_confidence:
        description: '최소 신뢰도 (0–100, 이 값 미만은 website 저장 안 함)'
        required: false
        default: '0'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > scrapers/credentials.json

      - name: Write .env
        run: |
          cat > scrapers/.env << 'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          CREDS_FILE=scrapers/credentials.json
          EOF

      - name: Run Gemini scraper (chunk ${{ matrix.chunk }})
        run: |
          python -u scrapers/gemini_scraper.py \
            --chunk ${{ matrix.chunk }} \
            --total-chunks ${{ github.event.inputs.total_chunks || '4' }} \
            --limit ${{ github.event.inputs.limit || '1000' }} \
            --category "${{ github.event.inputs.category || 'restaurant' }}" \
            --min-confidence ${{ github.event.inputs.min_confidence || '0' }}
        env:
          PYTHONUNBUFFERED: "1"
